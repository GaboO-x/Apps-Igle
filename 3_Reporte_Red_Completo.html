<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidador General de Red</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --roja: #dc3545;
            --azul: #007bff;
            --amarilla: #ffc107;
            --naranja: #fd7e14;
            --verde: #28a745;
            --morada: #7b2fbe;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; color: #333; padding-bottom: 30px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        h1 { text-align: center; color: #333; margin: 0 0 25px 0; }

        .color-group { margin-bottom: 30px; }
        .color-group-title {
            font-size: 1.05em; font-weight: bold; letter-spacing: 1px;
            padding: 6px 12px; border-radius: 6px; color: white;
            margin-bottom: 10px; display: inline-block;
        }
        .title-roja { background: var(--roja); }
        .title-azul { background: var(--azul); }
        .title-amarilla { background: var(--amarilla); color: #333; }
        .title-naranja { background: var(--naranja); }
        .title-verde { background: var(--verde); }
        .title-morada { background: var(--morada); }

        .unit-section { margin-bottom: 12px; border: 1px solid #dee2e6; border-radius: 10px; overflow: hidden; }
        .unit-header { padding: 10px 12px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px; font-size: 0.9em; }
        .u-roja .unit-header { background: var(--roja); }
        .u-azul .unit-header { background: var(--azul); }
        .u-amarilla .unit-header { background: var(--amarilla); color: #333; }
        .u-naranja .unit-header { background: var(--naranja); }
        .u-verde .unit-header { background: var(--verde); }
        .u-morada .unit-header { background: var(--morada); }

        textarea {
            width: 100%; height: 130px;
            border: 1px solid #eee; border-top: none;
            padding: 12px; box-sizing: border-box; resize: vertical;
            font-family: monospace; font-size: 0.85em;
            background: #fafafa; color: #111;
            outline: none;
        }
        .u-roja textarea:focus { border-color: var(--roja); }
        .u-azul textarea:focus { border-color: var(--azul); }
        .u-amarilla textarea:focus { border-color: var(--amarilla); }
        .u-naranja textarea:focus { border-color: var(--naranja); }
        .u-verde textarea:focus { border-color: var(--verde); }
        .u-morada textarea:focus { border-color: var(--morada); }

        .action-bar { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn-main { padding: 12px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: inline-flex; align-items: center; gap: 8px; font-size: 0.95em; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        .btn-main:active { transform: scale(0.98); }

        #status-msg { text-align: center; font-size: 0.9em; color: #666; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 CONSOLIDADO</h1>
    <div style="text-align:center; margin:-15px 0 10px 0;">
        <select id="week-selector" style="padding:8px 14px; border-radius:8px; border:1px solid #ddd; font-size:1em; font-weight:bold; color:#555; background:white; cursor:pointer;" onchange="onWeekChange()"></select>
        <div id="week-dates-display" style="font-size:0.78em; color:#888; font-style:italic; margin-top:3px;"></div>
    </div>
    <div style="text-align:center; margin-bottom:18px;">
        <label style="display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:0.95em; font-weight:bold; color:#555; user-select:none; background:#f0f0f0; padding:7px 16px; border-radius:8px; border:1px solid #ddd;">
            <input type="checkbox" id="makers-checkbox" checked style="width:17px;height:17px;cursor:pointer;" onchange="toggleAllMakers(this.checked)">
            MAKERS
        </label>
    </div>
    <div id="units-container"></div>
    <div id="status-msg"></div>
    <div class="action-bar">
        <button class="btn-main btn-blue" onclick="copyFinalReport()">📋 COPIAR REPORTE</button>
        <button class="btn-main btn-green" onclick="generateExcel()">📊 REPORTE OFRENDAS</button>
        <button class="btn-main btn-red" onclick="resetData()">🗑 RESETEAR</button>
    </div>
</div>

<script>
const units = [
    { id: 'ROJA_TK',  label: 'UNIDAD ROJA — TAKERS/RJ',  color: 'u-roja',     group: 'roja',     tipo: 'TK' },
    { id: 'ROJA_MK',  label: 'UNIDAD ROJA — MAKERS',      color: 'u-roja',     group: 'roja',     tipo: 'MK' },
    { id: 'AZUL_TK',  label: 'UNIDAD AZUL — TAKERS/RJ',  color: 'u-azul',     group: 'azul',     tipo: 'TK' },
    { id: 'AZUL_MK',  label: 'UNIDAD AZUL — MAKERS',      color: 'u-azul',     group: 'azul',     tipo: 'MK' },
    { id: 'AMAR_TK',  label: 'UNIDAD AMARILLA — TAKERS/RJ', color: 'u-amarilla', group: 'amarilla', tipo: 'TK' },
    { id: 'AMAR_MK',  label: 'UNIDAD AMARILLA — MAKERS',  color: 'u-amarilla', group: 'amarilla', tipo: 'MK' },
    { id: 'NARA_TK',  label: 'UNIDAD NARANJA — TAKERS/RJ', color: 'u-naranja',  group: 'naranja',  tipo: 'TK' },
    { id: 'NARA_MK',  label: 'UNIDAD NARANJA — MAKERS',   color: 'u-naranja',  group: 'naranja',  tipo: 'MK' },
    { id: 'VERD_TK',  label: 'UNIDAD VERDE — TAKERS/RJ',  color: 'u-verde',    group: 'verde',    tipo: 'TK' },
    { id: 'VERD_MK',  label: 'UNIDAD VERDE — MAKERS',     color: 'u-verde',    group: 'verde',    tipo: 'MK' },
    { id: 'MORA_TK',  label: 'EQUIPOS (TAKERS + MAKERS)', color: 'u-morada',  group: 'morada',   tipo: 'TK' },
];

const colorGroups = [
    { key: 'morada',   label: 'UNIDAD EQUIPOS',   titleClass: 'title-morada' },
    { key: 'roja',     label: 'UNIDAD ROJA',     titleClass: 'title-roja' },
    { key: 'azul',     label: 'UNIDAD AZUL',     titleClass: 'title-azul' },
    { key: 'amarilla', label: 'UNIDAD AMARILLA', titleClass: 'title-amarilla' },
    { key: 'naranja',  label: 'UNIDAD NARANJA',  titleClass: 'title-naranja' },
    { key: 'verde',    label: 'UNIDAD VERDE',     titleClass: 'title-verde' },
];

const STORAGE_KEY = 'reporte_red_v2';

function saveAll() {
    const data = {};
    units.forEach(u => {
        const el = document.getElementById(`txt-${u.id}`);
        if (el) data[u.id] = el.value;
    });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadAll() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        units.forEach(u => {
            const el = document.getElementById(`txt-${u.id}`);
            if (el && typeof data[u.id] === 'string') el.value = data[u.id];
        });
    } catch(e) {}
}

function resetData() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    units.forEach(u => {
        const el = document.getElementById(`txt-${u.id}`);
        if (el) el.value = '';
    });
    window.finalReportStr = '';
    document.getElementById('status-msg').innerText = '';
}

// ── WEEK DROPDOWN ────────────────────────────────────────────────────────
const BASE_WEEK = new Date(2025, 11, 29); // Semana 1 = 29 dic 2025 (lunes)

function getWeekInfo(weekNum) {
    const start = new Date(BASE_WEEK);
    start.setDate(start.getDate() + (weekNum - 1) * 7);
    const end = new Date(start);
    end.setDate(end.getDate() + 6);
    const fmt = d => d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
    const fmtShort = d => d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
    // Label para validación: "del X de mes al Y de mes YYYY"
    const dateStr = `del ${fmtShort(start)} al ${fmtShort(end)} ${end.getFullYear()}`;
    return { dateStr };
}

function getCurrentWeekNum() {
    const today = new Date();
    // Normalizar a medianoche para evitar problemas de hora
    today.setHours(0,0,0,0);
    const base = new Date(BASE_WEEK);
    base.setHours(0,0,0,0);
    const diff = Math.floor((today - base) / (7 * 24 * 60 * 60 * 1000));
    return Math.max(1, diff + 1);
}

function setupWeekSelector() {
    const sel = document.getElementById('week-selector');
    const currentNum = getCurrentWeekNum();
    // Generate 52 weeks
    for (let i = 1; i <= 52; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.text = `Semana ${String(i).padStart(2,'0')}`;
        sel.appendChild(opt);
    }
    sel.value = Math.min(currentNum, 52);
    onWeekChange();
}

function onWeekChange() {
    const weekNum = parseInt(document.getElementById('week-selector').value);
    const { dateStr } = getWeekInfo(weekNum);
    document.getElementById('week-dates-display').innerText = dateStr;
}

function getSelectedWeekLabel() {
    const weekNum = parseInt(document.getElementById('week-selector').value);
    return `Semana ${weekNum}`;
}

function getSelectedDateStr() {
    const weekNum = parseInt(document.getElementById('week-selector').value);
    return getWeekInfo(weekNum).dateStr;
}

// ── UNIT VALIDATION ON PASTE ─────────────────────────────────────────────
// Expected line 2 per unit id
const UNIT_EXPECTED_LINE2 = {
    'MORA_TK':  '🟣 EQUIPOS',  // acepta bloque mixto TK+MK
    'ROJA_TK':  '🔴 UNIDAD ROJA RJ/TAKERS',
    'ROJA_MK':  '🔴 UNIDAD ROJA MAKERS',
    'AZUL_TK':  '🔵 UNIDAD AZUL RJ/TAKERS',
    'AZUL_MK':  '🔵 UNIDAD AZUL MAKERS',
    'AMAR_TK':  '🟡 UNIDAD AMARILLA RJ/TAKERS',
    'AMAR_MK':  '🟡 UNIDAD AMARILLA MAKERS',
    'NARA_TK':  '🟠 UNIDAD NARANJA RJ/TAKERS',
    'NARA_MK':  '🟠 UNIDAD NARANJA MAKERS',
    'VERD_TK':  '🟢 UNIDAD VERDE RJ/TAKERS',
    'VERD_MK':  '🟢 UNIDAD VERDE MAKERS',
};

function validatePaste(unitId, pastedText) {
    const lines = pastedText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    if (lines.length < 2) return; // Not enough lines to validate

    const line1 = lines[0]; // e.g. *Semana 26* (del 21 de junio al 27 de junio 2026)
    const line2 = lines[1]; // e.g. *🔴 UNIDAD ROJA RJ/TAKERS*

    const errors = [];

    // Validate week (line 1): extract "Semana N" from *Semana N* (...)
    const weekMatch = line1.match(/Semana\s+(\d+)/i);
    if (weekMatch) {
        const pastedWeekNum = parseInt(weekMatch[1]);
        const selectedWeekNum = parseInt(document.getElementById('week-selector').value);
        if (pastedWeekNum !== selectedWeekNum) {
            errors.push(`⚠️ Semana incorrecta: el reporte es Semana ${pastedWeekNum} pero el app tiene Semana ${selectedWeekNum}`);
        }
    } else {
        errors.push('⚠️ No se encontró número de semana en la línea 1');
    }

    // Validate unit (line 2): strip asterisks and compare
    const cleanLine2 = line2.replace(/\*/g, '').trim();
    const expected = UNIT_EXPECTED_LINE2[unitId];
    if (expected && cleanLine2 !== expected) {
        errors.push(`⚠️ Unidad incorrecta: se esperaba "${expected}" pero se recibió "${cleanLine2}"`);
    }

    return errors;
}

function attachPasteValidation(unitId) {
    const el = document.getElementById(`txt-${unitId}`);
    if (!el) return;
    el.addEventListener('paste', function(e) {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        const errors = validatePaste(unitId, pasted);
        if (errors.length > 0) {
            alert(errors.join('\n'));
            // Discard — do not insert text
        } else {
            // Insert at cursor position
            const start = el.selectionStart;
            const end = el.selectionEnd;
            el.value = el.value.slice(0, start) + pasted + el.value.slice(end);
            el.selectionStart = el.selectionEnd = start + pasted.length;
            calculateAll();
        }
    });
}


// ── MAKERS TOGGLE STATE ───────────────────────────────────────────────────
let makersGlobalEnabled = true;

function toggleAllMakers(enabled) {
    makersGlobalEnabled = enabled;
    ['roja','azul','amarilla','naranja','verde'].forEach(group => {
        const mkSection = document.getElementById(`mk-section-${group}`);
        if (mkSection) mkSection.style.display = enabled ? '' : 'none';
    });
    calculateAll();
}

// ── RENDER BOXES ──────────────────────────────────────────────────────────
const container = document.getElementById('units-container');
colorGroups.forEach(group => {
    const groupUnits = units.filter(u => u.group === group.key);
    const tkUnit = groupUnits.find(u => u.tipo === 'TK');
    const mkUnit = groupUnits.find(u => u.tipo === 'MK');

    let html = `<div class="color-group">
        <div class="color-group-title ${group.titleClass}">🔹 ${group.label}</div>`;

    if (group.key === 'morada') {
        // EQUIPOS: un solo textarea que acepta TK + MK mezclados
        html += `
        <div class="unit-section ${tkUnit.color}">
            <div class="unit-header">${tkUnit.label}</div>
            <textarea id="txt-${tkUnit.id}" placeholder="Pegar reporte EQUIPOS aquí (contiene TAKERS y MAKERS)..." oninput="calculateAll()" style="height:160px;"></textarea>
        </div>`;
    } else {
        html += `
        <div class="unit-section ${tkUnit.color}">
            <div class="unit-header">${tkUnit.label}</div>
            <textarea id="txt-${tkUnit.id}" placeholder="Pegar reporte aquí..." oninput="calculateAll()"></textarea>
        </div>`;

        html += `<div id="mk-section-${group.key}">
        <div class="unit-section ${mkUnit.color}">
            <div class="unit-header">${mkUnit.label}</div>
            <textarea id="txt-${mkUnit.id}" placeholder="Pegar reporte aquí..." oninput="calculateAll()"></textarea>
        </div>
    </div>`;
    }

    html += `</div>`;
    container.innerHTML += html;
});

// Attach paste validation after all textareas are rendered
units.forEach(u => attachPasteValidation(u.id));

setupWeekSelector();
loadAll();
calculateAll();

// ── EQUIPOS: extrae sub-bloque TK o MK de un texto mixto ────────────────
function extractEquiposSubBlock(text, tipo) {
    // Detecta sección TAKERS por "--- TAKERS ---" y MAKERS por "--- MAKERS ---"
    // Cada sección termina donde comienza la siguiente o en RESUMEN OFRENDAS ACUMULADO
    if (tipo === 'TK') {
        // Desde inicio del texto hasta el bloque MAKERS (o fin si no hay)
        const mkIdx = text.search(/LÍDER:.*MAKERS|---\s*MAKERS\s*---/i);
        return mkIdx > 0 ? text.substring(0, mkIdx) : text;
    } else {
        // Desde el bloque MAKERS hasta RESUMEN OFRENDAS ACUMULADO (o fin)
        const mkIdx = text.search(/LÍDER:.*MAKERS|---\s*MAKERS\s*---/i);
        if (mkIdx < 0) return '';
        const acumIdx = text.search(/RESUMEN OFRENDAS ACUMULADO/i);
        return acumIdx > mkIdx ? text.substring(mkIdx, acumIdx) : text.substring(mkIdx);
    }
}

// ── PARSERS ──────────────────────────────────────────────────────────────

function extractSummaryValue(text, regex) {
    const parts = text.split(/RESUMEN OFRENDAS ACUMULADO/i);
    if (parts.length < 2) return 0;
    const summaryText = parts[1];
    const match = summaryText.match(regex);
    if (!match) return 0;
    let val = match[1].replace(/[₡\s.]/g, '').replace(',', '.');
    return parseFloat(val) || 0;
}

function extractDirectValue(text, regex) {
    const match = text.match(regex);
    if (!match) return 0;
    let val = match[1].replace(/[₡\s.]/g, '').replace(',', '.');
    return parseFloat(val) || 0;
}

function extractSinpeFromBlock(text) {
    // Para reportes individuales (sin RESUMEN ACUMULADO), busca Sinpe directo
    const hasSummary = /RESUMEN OFRENDAS ACUMULADO/i.test(text);
    if (hasSummary) return extractSummaryValue(text, /Sinpes?:\s*₡?([\d\s.,]+)/i);
    return extractDirectValue(text, /Sinpe:\s*₡?([\d\s.,]+)/i);
}

function extractEfectivoFromBlock(text) {
    const hasSummary = /RESUMEN OFRENDAS ACUMULADO/i.test(text);
    if (hasSummary) return extractSummaryValue(text, /Efectivo:\s*₡?([\d\s.,]+)/i);
    return extractDirectValue(text, /Efectivo:\s*₡?([\d\s.,]+)/i);
}

function extractAttendanceSummaryValue(text, regex) {
    const parts = text.split(/RESUMEN ASISTENCIA ACUMULADO/i);
    if (parts.length >= 2) {
        const summaryText = parts[1];
        const match = summaryText.match(regex);
        return match ? (parseInt(match[1]) || 0) : 0;
    }
    const match = text.match(regex);
    return match ? (parseInt(match[1]) || 0) : 0;
}
// ── TK/RJ extractors ─────────────────────────────────────────────────────
function extractRJCelula(text) {
    return extractAttendanceSummaryValue(text, /RJ C[eé]lula:\s*(\d+)/i);
}
function extractTakersCelula(text) {
    const m1 = extractAttendanceSummaryValue(text, /Takers C[eé]lula:\s*(\d+)/i);
    if (m1) return m1;
    return extractAttendanceSummaryValue(text, /Total C[eé]lula:\s*(\d+)/i);
}
function extractRJRed(text) {
    return extractAttendanceSummaryValue(text, /RJ Red:\s*(\d+)/i);
}
function extractTakersRed(text) {
    const m1 = extractAttendanceSummaryValue(text, /Takers Red:\s*(\d+)/i);
    if (m1) return m1;
    return extractAttendanceSummaryValue(text, /Total Red:\s*(\d+)/i);
}
function extractRJNuevos(text) {
    const m1 = extractAttendanceSummaryValue(text, /RJ Nuevos:\s*(\d+)/i);
    if (m1) return m1;
    return extractAttendanceSummaryValue(text, /Nuevos RJ:\s*(\d+)/i);
}
function extractTakersNuevos(text) {
    const m1 = extractAttendanceSummaryValue(text, /Takers Nuevos:\s*(\d+)/i);
    if (m1) return m1;
    const m2 = extractAttendanceSummaryValue(text, /Nuevos Takers:\s*(\d+)/i);
    if (m2) return m2;
    return extractAttendanceSummaryValue(text, /Total Nuevos:\s*(\d+)/i);
}
// ── MAKERS extractors ─────────────────────────────────────────────────────
function extractMakersCelula(text) {
    const m1 = extractAttendanceSummaryValue(text, /Total en C[eé]lula:\s*(\d+)/i);
    if (m1) return m1;
    return extractAttendanceSummaryValue(text, /Makers C[eé]lula:\s*(\d+)/i);
}
function extractMakersCulto(text) {
    const m1 = extractAttendanceSummaryValue(text, /Total en Culto:\s*(\d+)/i);
    if (m1) return m1;
    return extractAttendanceSummaryValue(text, /Makers Culto:\s*(\d+)/i);
}
function extractMakersNuevos(text) {
    return extractAttendanceSummaryValue(text, /Total Nuevos:\s*(\d+)/i);
}

// Extrae semana del texto: "Semana 26 (del 21 de junio al 27 de junio 2026)"
function extractWeekDate(text) {
    const m = text.match(/Semana\s+\d+\s*\(([^)]+)\)/i);
    return m ? m[1].trim() : null;
}

// Extrae nombre de líder del bloque
function extractLeaderName(text) {
    // Formato Takers/RJ: 🔥 *LÍDER: AA* 🔥
    const m1 = text.match(/LÍDER(?:\s*\(MAKERS\))?:\s*([^\n*🔥]+)/i);
    if (m1) return m1[1].trim().replace(/\*|\🔥/g, '').trim();
    return null;
}

// Para Excel: extrae todos los líderes con su sinpe/efectivo de un bloque TK (multi-líder)
// Divide el texto en sub-bloques por líder
function extractLeadersFromBlock(text) {
    // Busca todos los líderes en el texto
    const leaderRegex = /LÍDER(?:\s*\(MAKERS\))?:\s*([^\n*🔥]+)/gi;
    const leaders = [];
    let match;
    const positions = [];

    while ((match = leaderRegex.exec(text)) !== null) {
        positions.push({ name: match[1].trim().replace(/\*/g, '').trim(), index: match.index });
    }

    if (positions.length === 0) return [];

    positions.forEach((pos, i) => {
        const start = pos.index;
        const end = i + 1 < positions.length ? positions[i + 1].index : text.length;
        const block = text.substring(start, end);

        const sinpe = extractDirectValue(block, /Sinpe:\s*₡?([\d\s.,]+)/i);
        const efectivo = extractDirectValue(block, /Efectivo:\s*₡?([\d\s.,]+)/i);

        leaders.push({ name: pos.name, sinpe, efectivo });
    });

    return leaders;
}

// ── CALCULATE ALL (reporte de texto) ────────────────────────────────────

function calculateAll() {
    const colorOrder = ['roja', 'azul', 'amarilla', 'naranja', 'verde', 'morada'];
    let grandTotals = {
        tkS: 0, tkE: 0, mkS: 0, mkE: 0,
        tkCelula: 0, tkRed: 0, tkNuevos: 0,
        mkCelula: 0, mkCulto: 0, mkNuevos: 0
    };
    let fullDetailBody = "";
    let unitsActive = 0;

    colorOrder.forEach(color => {
        const tkUnit = units.find(u => u.group === color && u.tipo === 'TK');
        const tkEl = document.getElementById(`txt-${tkUnit.id}`);
        const tkRaw = tkEl ? tkEl.value : '';

        let tkVal, mkVal;
        if (color === 'morada') {
            tkVal = tkRaw ? extractEquiposSubBlock(tkRaw, 'TK') : '';
            mkVal = tkRaw ? extractEquiposSubBlock(tkRaw, 'MK') : '';
        } else {
            const mkUnit = units.find(u => u.group === color && u.tipo === 'MK');
            const mkEl = document.getElementById(`txt-${mkUnit.id}`);
            tkVal = tkRaw;
            mkVal = mkEl ? mkEl.value : '';
        }

        const hasTK = tkVal && tkVal.trim();
        const hasMK = mkVal && mkVal.trim() && makersGlobalEnabled;

        if (!hasTK && !hasMK) return;
        unitsActive++;

        const colorLabelMap = { roja: 'Roja', azul: 'Azul', amarilla: 'Amarilla', naranja: 'Naranja', verde: 'Verde', morada: 'Equipos' };
        const colorLabel = colorLabelMap[color] || (color.charAt(0).toUpperCase() + color.slice(1));
        const colorCircle = { roja: '🔴', azul: '🔵', amarilla: '🟡', naranja: '🟠', verde: '🟢', morada: '🟣' }[color] || '⚪';

        // ── TK/RJ block ───────────────────────────────────────────────
        if (hasTK) {
            const tkS = extractSinpeFromBlock(tkVal);
            const tkE = extractEfectivoFromBlock(tkVal);
            const tkCelula = extractRJCelula(tkVal) + extractTakersCelula(tkVal);
            const tkRed = extractRJRed(tkVal) + extractTakersRed(tkVal);
            const tkNuevos = extractRJNuevos(tkVal) + extractTakersNuevos(tkVal);

            grandTotals.tkS += tkS;
            grandTotals.tkE += tkE;
            grandTotals.tkCelula += tkCelula;
            grandTotals.tkRed += tkRed;
            grandTotals.tkNuevos += tkNuevos;

            fullDetailBody +=
                `*${colorCircle}UNIDAD ${colorLabel.toUpperCase()} — TAKERS/RJ${colorCircle}*\n` +
                `*---📊 RESUMEN OFRENDAS ACUMULADO---*\n` +
                `Sinpes: ₡${tkS.toLocaleString('es-CR')}\n` +
                `Efectivo: ₡${tkE.toLocaleString('es-CR')}\n` +
                `Total: ₡${(tkS + tkE).toLocaleString('es-CR')}\n\n` +
                `*---👥 RESUMEN ASISTENCIA ACUMULADO---*\n` +
                `Total Célula: ${tkCelula}\n` +
                `Total Red: ${tkRed}\n` +
                `Total Nuevos: ${tkNuevos}\n\n`;
        }

        // ── MAKERS block ──────────────────────────────────────────────
        if (hasMK) {
            const mkS = extractSinpeFromBlock(mkVal);
            const mkE = extractEfectivoFromBlock(mkVal);
            const mkCelula = extractMakersCelula(mkVal);
            const mkCulto = extractMakersCulto(mkVal);
            const mkNuevos = extractMakersNuevos(mkVal);

            grandTotals.mkS += mkS;
            grandTotals.mkE += mkE;
            grandTotals.mkCelula += mkCelula;
            grandTotals.mkCulto += mkCulto;
            grandTotals.mkNuevos += mkNuevos;

            fullDetailBody +=
                `*${colorCircle}UNIDAD ${colorLabel.toUpperCase()} — MAKERS${colorCircle}*\n` +
                `*---📊 RESUMEN OFRENDAS ACUMULADO---*\n` +
                `Sinpes: ₡${mkS.toLocaleString('es-CR')}\n` +
                `Efectivo: ₡${mkE.toLocaleString('es-CR')}\n` +
                `Total: ₡${(mkS + mkE).toLocaleString('es-CR')}\n\n` +
                `*---👥 RESUMEN ASISTENCIA ACUMULADO---*\n` +
                `Total Célula: ${mkCelula}\n` +
                `Total Culto: ${mkCulto}\n` +
                `Total Nuevos: ${mkNuevos}\n\n`;
        }

        fullDetailBody += `==============================\n\n`;
    });

    if (unitsActive > 0) {
        const totalS = grandTotals.tkS + grandTotals.mkS;
        const totalE = grandTotals.tkE + grandTotals.mkE;
        const totalCelula = grandTotals.tkCelula + grandTotals.mkCelula;
        const totalRedCulto = grandTotals.tkRed + grandTotals.mkCulto;

        const finalSumatory =
            `*🚀 SUMATORIA GENERAL DE ASISTENCIA MANA*\n\n` +
            `💰 *OFRENDAS TOTALES*\n` +
            `Sinpes: ₡${totalS.toLocaleString('es-CR')}\n` +
            `Efectivo: ₡${totalE.toLocaleString('es-CR')}\n` +
            `Total: ₡${(totalS + totalE).toLocaleString('es-CR')}\n\n` +
            `👥 *ASISTENCIA TOTAL*\n` +
            `Total Célula: ${totalCelula}\n` +
            `Total Jovenes a Red: ${grandTotals.tkRed}\n` +
            `Total Makers a Culto: ${grandTotals.mkCulto}\n` +
            `Total Red + Culto: ${totalRedCulto}`;

        window.finalReportStr = fullDetailBody + finalSumatory;
        document.getElementById('status-msg').innerText = "✅ Reporte actualizado y listo";
    } else {
        window.finalReportStr = "";
        document.getElementById('status-msg').innerText = "";
    }
    saveAll();
}

// ── COPY REPORT ──────────────────────────────────────────────────────────

function copyFinalReport() {
    if (!window.finalReportStr) { alert("Ingresá datos en al menos una unidad."); return; }
    navigator.clipboard.writeText(window.finalReportStr);
    const btn = document.querySelectorAll('.btn-main')[0];
    btn.innerText = "¡COPIADO! ✅";
    btn.style.background = "#28a745";
    setTimeout(() => { btn.innerText = "📋 COPIAR REPORTE"; btn.style.background = "#007bff"; }, 2000);
}

// ── EXCEL EXPORT ─────────────────────────────────────────────────────────

function styleHeader(ws, range, color) {
    for (let C = range.s.c; C <= range.e.c; C++) {
        const cell = ws[XLSX.utils.encode_cell({ r: range.s.r, c: C })];
        if (!cell) continue;
        cell.s = {
            font: { bold: true, color: { rgb: color === 'dark' ? '333333' : 'FFFFFF' } },
            fill: { fgColor: { rgb: color === 'dark' ? 'FFC107' : color } },
            alignment: { horizontal: 'center', vertical: 'center' },
            border: {
                top: { style: 'thin', color: { rgb: 'CCCCCC' } },
                bottom: { style: 'thin', color: { rgb: 'CCCCCC' } },
                left: { style: 'thin', color: { rgb: 'CCCCCC' } },
                right: { style: 'thin', color: { rgb: 'CCCCCC' } }
            }
        };
    }
}

function styleCell(ws, r, c, isBold, bgColor) {
    const addr = XLSX.utils.encode_cell({ r, c });
    if (!ws[addr]) ws[addr] = { v: '', t: 's' };
    ws[addr].s = {
        font: { bold: !!isBold },
        fill: bgColor ? { fgColor: { rgb: bgColor } } : undefined,
        border: {
            top: { style: 'thin', color: { rgb: 'EEEEEE' } },
            bottom: { style: 'thin', color: { rgb: 'EEEEEE' } },
            left: { style: 'thin', color: { rgb: 'EEEEEE' } },
            right: { style: 'thin', color: { rgb: 'EEEEEE' } }
        },
        alignment: { vertical: 'center' }
    };
}

function generateExcel() {
    // Detectar fecha desde cualquier box con texto
    let weekDate = null;
    for (const u of units) {
        const val = document.getElementById(`txt-${u.id}`).value;
        if (val && val.trim()) {
            weekDate = extractWeekDate(val);
            if (weekDate) break;
        }
    }
    if (!weekDate) weekDate = new Date().toLocaleDateString('es-CR');

    const wb = XLSX.utils.book_new();

    // Colores por unidad (hex sin #)
    const unitColors = {
        roja: 'DC3545', azul: '007BFF', amarilla: 'FFC107',
        naranja: 'FD7E14', verde: '28A745', morada: '7B2FBE'
    };
    const unitNames = {
        roja: 'Roja', azul: 'Azul', amarilla: 'Amarilla',
        naranja: 'Naranja', verde: 'Verde', morada: 'Equipos'
    };

    // ── Pestaña: Sumarización SINPE ──────────────────────────────────────
    const sumData = [
        ['UNIDAD', weekDate]
    ];

    const colorOrder = ['roja', 'azul', 'amarilla', 'naranja', 'verde', 'morada'];

    colorOrder.forEach(color => {
        const tkUnit = units.find(u => u.group === color && u.tipo === 'TK');
        const tkRaw = document.getElementById(`txt-${tkUnit.id}`).value;

        let tkVal, mkVal;
        if (color === 'morada') {
            tkVal = tkRaw ? extractEquiposSubBlock(tkRaw, 'TK') : '';
            mkVal = tkRaw ? extractEquiposSubBlock(tkRaw, 'MK') : '';
        } else {
            const mkUnit = units.find(u => u.group === color && u.tipo === 'MK');
            tkVal = tkRaw;
            mkVal = document.getElementById(`txt-${mkUnit.id}`).value;
        }

        const tkSinpe = tkVal ? extractSinpeFromBlock(tkVal) : 0;
        const mkSinpe = (mkVal && makersGlobalEnabled) ? extractSinpeFromBlock(mkVal) : 0;
        const name = unitNames[color];

        sumData.push([`${name} Takers`, tkSinpe]);
        if (makersGlobalEnabled) sumData.push([`${name} Makers`, mkSinpe]);
    });

    // Totals row
    const totalSinpe = sumData.slice(1).reduce((a, r) => a + (r[1] || 0), 0);
    sumData.push(['Total SINPE', totalSinpe]);

    const wsSuma = XLSX.utils.aoa_to_sheet(sumData);
    wsSuma['!cols'] = [{ wch: 22 }, { wch: 18 }];

    // Style Sumarización header
    styleHeader(wsSuma, { s: { r: 0, c: 0 }, e: { r: 0, c: 1 } }, '2C3E50');

    // Style each row
    let rowColors = {
        roja: 'FFEBEE', azul: 'E3F2FD', amarilla: 'FFFDE7',
        naranja: 'FFF3E0', verde: 'E8F5E9', morada: 'F3E5F5'
    };
    const rowColorMap = [];
    colorOrder.forEach(c => { rowColorMap.push(c); if (makersGlobalEnabled) rowColorMap.push(c); });

    for (let r = 1; r < sumData.length - 1; r++) {
        const color = rowColorMap[r - 1];
        styleCell(wsSuma, r, 0, false, rowColors[color]);
        styleCell(wsSuma, r, 1, false, rowColors[color]);
    }
    // Total row bold
    const totalRow = sumData.length - 1;
    styleCell(wsSuma, totalRow, 0, true, 'E0E0E0');
    styleCell(wsSuma, totalRow, 1, true, 'E0E0E0');

    wsSuma['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: sumData.length - 1, c: 1 } });
    XLSX.utils.book_append_sheet(wb, wsSuma, 'Sumarizacion SINPE');

    // ── Pestañas por color ────────────────────────────────────────────────
    colorOrder.forEach(color => {
        const tkUnit = units.find(u => u.group === color && u.tipo === 'TK');
        const tkRaw = document.getElementById(`txt-${tkUnit.id}`).value || '';

        let tkVal, mkVal;
        if (color === 'morada') {
            tkVal = tkRaw ? extractEquiposSubBlock(tkRaw, 'TK') : '';
            mkVal = tkRaw ? extractEquiposSubBlock(tkRaw, 'MK') : '';
        } else {
            const mkUnit = units.find(u => u.group === color && u.tipo === 'MK');
            tkVal = tkRaw;
            mkVal = document.getElementById(`txt-${mkUnit.id}`).value || '';
        }

        const sheetData = [['LÍDER', weekDate, 'TIPO']];

        // --- TAKERS / RJ ---
        if (tkVal.trim()) {
            sheetData.push(['TAKERS / RJ', '', '']);
            const leaders = extractLeadersFromBlock(tkVal);

            if (leaders.length > 0) {
                leaders.forEach(l => {
                    if (l.sinpe > 0) sheetData.push([l.name, l.sinpe, 'S']);
                    if (l.efectivo > 0) sheetData.push([l.name, l.efectivo, 'E']);
                });
            }

            const tkSinpe = extractSinpeFromBlock(tkVal);
            const tkEfect = extractEfectivoFromBlock(tkVal);
            sheetData.push(['Total SINPE', tkSinpe, '']);
            sheetData.push(['', '', '']);
        }

        // --- MAKERS ---
        if (mkVal.trim() && makersGlobalEnabled) {
            sheetData.push(['MAKERS', '', '']);
            const leaders = extractLeadersFromBlock(mkVal);

            if (leaders.length > 0) {
                leaders.forEach(l => {
                    if (l.sinpe > 0) sheetData.push([l.name, l.sinpe, 'S']);
                    if (l.efectivo > 0) sheetData.push([l.name, l.efectivo, 'E']);
                });
            }

            const mkSinpe = extractSinpeFromBlock(mkVal);
            sheetData.push(['Total SINPE', mkSinpe, '']);
        }

        const wsColor = XLSX.utils.aoa_to_sheet(sheetData);
        wsColor['!cols'] = [{ wch: 28 }, { wch: 16 }, { wch: 8 }];

        const headerColor = color === 'amarilla' ? 'dark' : unitColors[color];
        styleHeader(wsColor, { s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }, headerColor);

        // Style section headers (TAKERS/RJ, MAKERS)
        for (let r = 1; r < sheetData.length; r++) {
            const label = sheetData[r][0];
            const isSectionHeader = label === 'TAKERS / RJ' || label === 'MAKERS';
            const isTotalRow = label === 'Total SINPE';
            styleCell(wsColor, r, 0, isSectionHeader || isTotalRow, isSectionHeader ? 'F5F5F5' : (isTotalRow ? 'E0E0E0' : null));
            styleCell(wsColor, r, 1, isTotalRow, isTotalRow ? 'E0E0E0' : null);
            styleCell(wsColor, r, 2, false, null);
        }

        wsColor['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: sheetData.length - 1, c: 2 } });
        XLSX.utils.book_append_sheet(wb, wsColor, unitNames[color]);
    });

    XLSX.writeFile(wb, `Reporte_Ofrendas_${weekDate.replace(/\s+/g, '_')}.xlsx`);
    document.getElementById('status-msg').innerText = `✅ Excel generado: ${weekDate}`;
}
</script>
