<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Unidades 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-inputs { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 25px; }
        select, .date-display { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 1.1em; font-weight: bold; }
        .date-display { border: none; color: #666; font-style: italic; font-weight: normal; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 3px solid #007bff; }
        .tab { padding: 12px 15px; cursor: pointer; border: none; background: #e9ecef; border-radius: 10px 10px 0 0; font-weight: bold; flex: 1; text-align: center; }
        .tab.active { background: #007bff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .unit-section { margin-bottom: 25px; border: 1px solid #dee2e6; border-radius: 10px; overflow: hidden; page-break-inside: avoid; }
        .unit-header { padding: 12px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .equipo { background: #a3008d; }
        .azul { background: #007bff; } .roja { background: #dc3545; } .verde { background: #28a745; } 
        .naranja { background: #fd7e14; } .amarilla { background: #ffc107; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        input { border: 1px solid transparent; width: 85%; padding: 5px; border-radius: 4px; font-size: 14px; background: transparent; }
        .btn-add, .btn-del { cursor: pointer; }
        .btn-add { display: none; }
        .btn-del { display: none; }
        .subgroup-header { background: #f0f0f0; font-weight: bold; font-size: 12px; padding: 4px 8px; color: #555; border-top: 1px solid #ddd; }
        .summary-row td { font-weight: bold; font-size: 12px; padding: 5px 8px; background: #e8e8e8; border-top: 2px solid #bbb; }
        .summary-row.total-row td { background: #d0d0d0; font-size: 13px; }
        .summary-label { color: #444; }
        .action-bar { display: flex; gap: 10px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn-main { padding: 12px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
        .btn-blue { background: #007bff; }
        .btn-red { background: #e74c3c; }
    </style>
</head>
<body>

<div class="container" id="app-content">
    <div class="header-inputs">
        <select id="week-selector" onchange="updateWeekDates()"></select>
        <div id="week-dates-display" class="date-display"></div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="openTab(event, 'Makers')">Makers</div>
        <div class="tab" onclick="openTab(event, 'Takers')">TAKERS/RJ</div>
    </div>
    <div id="Makers" class="tab-content active"></div>
    <div id="Takers" class="tab-content"></div>
</div>

<div class="action-bar">
    <button class="btn-main btn-blue" onclick="copyToClipboard()">📋 Copiar WhatsApp</button>
    <button class="btn-main btn-blue" onclick="downloadPDF()">📄 Descargar PDF</button>
    <button class="btn-main btn-red" onclick="resetToTemplate()">🔄 Resetear</button>
</div>

<script>
    const plantillaMakers = {
        '__EQUIPOS__': ['Hombre', 'Mujeres'],
        'Roja':    { MAKERS: ['John y Esther', 'Esther', 'Marina'] },
        'Azul':    { MAKERS: ['Pra Francela Virtual', 'Pra. Francela2', 'Ana Yansi', 'Miriam'] },
        'Verde':   { MAKERS: ['Pr. Julio', 'Javier y Yorleni', 'Migdalia'] },
        'Naranja': { MAKERS: ['Nuria', 'Roxana', 'Yorleny M'] },
        'Amarilla':{ MAKERS: ['Pr Carlos', 'Alex V', 'Dany y Sandra','Guillermo y Antonieta', 'Joyce'] },
    };

    const plantillaTakers = {
        '__EQUIPOS__': ['Jovenes'],
        'Roja':    { TAKERS: ['EQUIPO Gabriel, Raquel', 'Cynthia', 'Jean', 'Tony R'], RJ: ['Anyel', 'Joel', 'Josue R', 'Waldin'] },
        'Azul':    { TAKERS: ['EQUIPO Alonso, Amanda', 'Evelyn', 'Jorge, Melany', 'Tony G', 'Valery B'], RJ: ['Alex y Yuli', 'Sharon y abraham'] },
        'Verde':   { TAKERS: ['EQUIPO Byron, Ariel', 'Gaudy', 'Iveth', 'Jose, Eva', 'Maiky y Giovanna', 'Sarai Armas'], RJ: ['Will y Dani', 'Greivin'] },
        'Naranja': { TAKERS: ['EQUIPO Angie, Bayron', 'Brayan y Kelly', 'Dago y Maira', 'Jonathan y Priscilla', 'Keneth'], RJ: ['Andres Matus', 'Josué S', 'Stephen y Valery'] },
        'Amarilla':{ TAKERS: ['EQUIPO Aaron, Heyling', 'Abigail', 'Hazel', 'Laura'], RJ: ['Pablo A', 'Yehilin'] }
    };

    const unidades = [
        { nombre: 'Azul', clase: 'azul', emoji: '💙' },
        { nombre: 'Roja', clase: 'roja', emoji: '❤️' },
        { nombre: 'Verde', clase: 'verde', emoji: '💚' },
        { nombre: 'Naranja', clase: 'naranja', emoji: '🧡' },
        { nombre: 'Amarilla', clase: 'amarilla', emoji: '💛' }
    ];

    // Semana: Domingo a Sábado. Semana 1 = 28 Dic 2025
    const FIRST_SUNDAY = new Date(2025, 11, 28); // 28 de diciembre 2025

    function getCurrentWeekNumber() {
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const diff = now - FIRST_SUNDAY;
        if (diff < 0) return 1;
        const week = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
        return Math.min(week, 52);
    }

    function setupWeekSelector() {
        const selector = document.getElementById('week-selector');
        for (let i = 1; i <= 52; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.text = `Semana ${i.toString().padStart(2, '0')}`;
            selector.add(opt);
        }
        selector.value = getCurrentWeekNumber();
        updateWeekDates();
    }

    function updateWeekDates() {
        const week = parseInt(document.getElementById('week-selector').value);
        const sunday = new Date(FIRST_SUNDAY);
        sunday.setDate(FIRST_SUNDAY.getDate() + (week - 1) * 7);
        const saturday = new Date(sunday);
        saturday.setDate(sunday.getDate() + 6);
        document.getElementById('week-dates-display').innerText =
            `del ${sunday.toLocaleDateString('es-ES', {day:'numeric', month:'long'})} al ${saturday.toLocaleDateString('es-ES', {day:'numeric', month:'long'})} 2026`;
    }

    
    function ensureEquipos(tabId, data) {
        if (Array.isArray(data) && data.some(u => u && u.nombre === 'Equipos')) return data;
        const source = (tabId === 'Makers') ? plantillaMakers : plantillaTakers;
        const equipos = source['__EQUIPOS__'] || [];
        const equiposData = {
            nombre: 'Equipos',
            clase: 'equipo',
            emoji: '👥',
            filas: equipos.map(n => ({n: n, a: '', m: ''}))
        };
        return [equiposData].concat(Array.isArray(data) ? data : []);
    }

function init() {
        setupWeekSelector();
        ['Makers', 'Takers'].forEach(tabId => {
            // Siempre renderiza desde la plantilla (nombres siempre del código)
            renderDefaults(tabId);
            // Luego restaura solo los datos ingresados (asistencia y montos) desde localStorage
            const savedDataRaw = JSON.parse(localStorage.getItem(`vFinalUnique_data_${tabId}`));
            if (savedDataRaw) restoreInputData(tabId, savedDataRaw);
            rebuildSummaries();
        });
    }

    // Restaura únicamente los valores de asistencia y monto, sin tocar los nombres
    function restoreInputData(tabId, savedData) {
        const container = document.getElementById(tabId);
        savedData.forEach(savedUnit => {
            const tableId = `table-${tabId}-${savedUnit.nombre}`;
            const table = container.querySelector(`#${tableId}`);
            if (!table) return;

            if (savedUnit.subgroups) {
                // TAKERS/RJ: recorre filas por subgrupo
                ['TAKERS', 'RJ'].forEach(group => {
                    const savedRows = savedUnit.subgroups[group] || [];
                    // Encuentra las filas del DOM correspondientes a este subgrupo
                    let inGroup = false;
                    let rowIdx = 0;
                    table.querySelectorAll('tbody tr').forEach(tr => {
                        const sep = tr.querySelector('.subgroup-header');
                        if (sep) {
                            inGroup = sep.innerText.includes(group);
                            if (inGroup) rowIdx = 0;
                            return;
                        }
                        if (inGroup && tr.querySelector('.in-n') && savedRows[rowIdx]) {
                            tr.querySelector('.in-a').value = savedRows[rowIdx].a || '';
                            tr.querySelector('.in-m').value = savedRows[rowIdx].m || '';
                            rowIdx++;
                        }
                    });
                });
            } else {
                // Makers / Equipos: recorre filas en orden
                const savedRows = savedUnit.filas || [];
                const domRows = Array.from(table.querySelectorAll('tbody tr')).filter(tr => tr.querySelector('.in-n'));
                domRows.forEach((tr, i) => {
                    if (savedRows[i]) {
                        tr.querySelector('.in-a').value = savedRows[i].a || '';
                        tr.querySelector('.in-m').value = savedRows[i].m || '';
                    }
                });
            }
        });
    }

    function renderDefaults(tabId) {
        const container = document.getElementById(tabId);
        container.innerHTML = '';
        const source = (tabId === 'Makers') ? plantillaMakers : plantillaTakers;

        if (source['__EQUIPOS__']) {
            const equiposData = {
                nombre: 'Equipos',
                clase: 'equipo',
                emoji: '👥',
                filas: source['__EQUIPOS__'].map(n => ({n: n, a: '', m: ''}))
            };
            container.appendChild(createUnitElement(tabId, equiposData));
        }

        unidades.forEach(u => {
            const srcUnit = source[u.nombre];
            let unitData;
            if (tabId === 'Takers' && srcUnit && typeof srcUnit === 'object' && !Array.isArray(srcUnit)) {
                unitData = {
                    nombre: u.nombre, clase: u.clase, emoji: u.emoji,
                    subgroups: {
                        TAKERS: (srcUnit.TAKERS || []).map(n => ({n, a: '', m: ''})),
                        RJ:     (srcUnit.RJ     || []).map(n => ({n, a: '', m: ''}))
                    }
                };
            } else {
                // Para Makers: srcUnit es { MAKERS: [...] }, extraer el array
                let filas = [];
                if (Array.isArray(srcUnit)) {
                    filas = srcUnit;
                } else if (srcUnit && Array.isArray(srcUnit.MAKERS)) {
                    filas = srcUnit.MAKERS;
                }
                unitData = {
                    nombre: u.nombre, clase: u.clase, emoji: u.emoji,
                    filas: filas.map(n => ({n, a: '', m: ''}))
                };
            }
            container.appendChild(createUnitElement(tabId, unitData));
        });
    }

    function createUnitElement(tabId, unitData) {
        const div = document.createElement('div');
        div.className = 'unit-section';

        let tbodyContent = '';
        if (unitData.subgroups) {
            // TAKERS/RJ sub-groups
            tbodyContent += `<tr><td colspan="3" class="subgroup-header">— TAKERS —</td></tr>`;
            tbodyContent += (unitData.subgroups.TAKERS || []).map(f => renderRowHtml(f)).join('');
            tbodyContent += `<tr><td colspan="3" class="subgroup-header">— RJ —</td></tr>`;
            tbodyContent += (unitData.subgroups.RJ || []).map(f => renderRowHtml(f)).join('');
        } else {
            tbodyContent = (unitData.filas || []).map(f => renderRowHtml(f)).join('');
        }

        div.innerHTML = `
            <div class="unit-header ${unitData.clase}">
                <span>Unidad ${unitData.nombre} ${unitData.emoji}</span>
            </div>
            <table id="table-${tabId}-${unitData.nombre}">
                <thead><tr><th>Nombre</th><th style="width:50px">Asist</th><th style="width:100px">Monto ₡</th></tr></thead>
                <tbody>${tbodyContent}</tbody>
            </table>`;
        return div;
    }

    function renderRowHtml(f = {n:'', a:'', m:''}) {
        return `<tr>
            <td><input type="text" class="in-n" value="${f.n}" onchange="saveAll()"></td>
            <td><input type="text" class="in-a" value="${f.a}" placeholder="##" inputmode="numeric"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')" onchange="saveAll()"></td>
            <td><input type="text" class="in-m" value="${f.m}" placeholder="0.000" inputmode="decimal"
                oninput="this.value=this.value.replace(/[^0-9.]/g,'')" onchange="saveAll()"></td>
        </tr>`;
    }

    function addRow(tabId, unitName) {
        document.querySelector(`#table-${tabId}-${unitName} tbody`).insertAdjacentHTML('beforeend', renderRowHtml({n: 'Nuevo', a:'', m:''}));
        saveAll();
    }

    function removeThisRow(btn) {
        if(confirm("¿Eliminar esta fila?")) { btn.closest('tr').remove(); saveAll(); }
    }

    function saveAll() {
        ['Makers', 'Takers'].forEach(tabId => {
            const units = [];
            document.getElementById(tabId).querySelectorAll('.unit-section').forEach(sec => {
                const headerText = sec.querySelector('.unit-header span').innerText;
                const nombre = headerText.replace('Unidad ', '').split(' ')[0].trim();
                const uInfo = unidades.find(u => u.nombre === nombre) || { clase:'equipo', emoji:'👥' };

                // Check if this unit has subgroups (TAKERS/RJ)
                const separators = sec.querySelectorAll('.subgroup-header');
                if (separators.length > 0) {
                    // Has subgroups: collect rows per section
                    const subgroups = { TAKERS: [], RJ: [] };
                    let currentGroup = null;
                    sec.querySelectorAll('tbody tr').forEach(tr => {
                        const sep = tr.querySelector('.subgroup-header');
                        if (sep) {
                            if (sep.innerText.includes('TAKERS')) currentGroup = 'TAKERS';
                            else if (sep.innerText.includes('RJ')) currentGroup = 'RJ';
                        } else if (currentGroup && tr.querySelector('.in-n')) {
                            subgroups[currentGroup].push({
                                n: tr.querySelector('.in-n').value,
                                a: tr.querySelector('.in-a').value,
                                m: tr.querySelector('.in-m').value
                            });
                        }
                    });
                    units.push({ nombre, clase: uInfo.clase, emoji: uInfo.emoji, subgroups });
                } else {
                    const filas = Array.from(sec.querySelectorAll('tbody tr')).filter(tr => tr.querySelector('.in-n')).map(tr => ({
                        n: tr.querySelector('.in-n').value,
                        a: tr.querySelector('.in-a').value,
                        m: tr.querySelector('.in-m').value
                    }));
                    units.push({ nombre, clase: uInfo.clase, emoji: uInfo.emoji, filas });
                }
            });
            localStorage.setItem(`vFinalUnique_data_${tabId}`, JSON.stringify(units));
        });
        rebuildSummaries();
    }

    function resetToTemplate() {
        if(confirm("Se borrarán todos los montos y asistencias ingresados. ¿Continuar?")) {
            localStorage.removeItem(`vFinalUnique_data_Makers`);
            localStorage.removeItem(`vFinalUnique_data_Takers`);
            renderDefaults('Makers');
            renderDefaults('Takers');
            rebuildSummaries();
        }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function copyToClipboard() {
        const activeTab = document.querySelector('.tab-content.active');
        const weekStr = document.getElementById('week-selector').options[document.getElementById('week-selector').selectedIndex].text;
        let text = `*REPORTE ${activeTab.id.toUpperCase()}*\n*${weekStr}*\n_${document.getElementById('week-dates-display').innerText}_\n\n`;
        
        activeTab.querySelectorAll('.unit-section').forEach(sec => {
            text += `*--- ${sec.querySelector('.unit-header span').innerText.toUpperCase()} ---*\n`;
            let lastSep = '';
            sec.querySelectorAll('tbody tr').forEach(tr => {
                const sepEl = tr.querySelector('.subgroup-header');
                if (sepEl) {
                    lastSep = sepEl.innerText.trim();
                    text += `_${lastSep}_\n`;
                } else {
                    const nEl = tr.querySelector('.in-n');
                    if (nEl && nEl.value) {
                        text += `• ${nEl.value} | Asist: ${tr.querySelector('.in-a').value || 0} | ₡${tr.querySelector('.in-m').value || 0}\n`;
                    }
                }
            });
            text += `\n`;
        });

        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        alert('¡Copiado para WhatsApp!');
    }

    function downloadPDF() {
        saveAll();
        const weekVal = document.getElementById('week-selector').value;
        const weekStr = document.getElementById('week-selector').options[document.getElementById('week-selector').selectedIndex].text;
        const dateStr = document.getElementById('week-dates-display').innerText;

        // Construye una página (1 tab = 1 página) y elimina espacios extra para el PDF
        function buildPdfPage(tabId, tabLabel) {
            const element = document.createElement('div');
            element.style.padding = '10px';
            element.style.background = 'white';
            element.style.width = '800px';
            element.style.boxSizing = 'border-box';

            const style = `
                <style>
                    * { box-sizing: border-box; }
                    body { font-family: 'Segoe UI', sans-serif; color: #333; }
                    .pdf-title { text-align: center; border-bottom: 2px solid #333; margin-bottom: 10px; padding-bottom: 8px; }
                    .pdf-title h1 { margin: 0; font-size: 18px; }
                    .pdf-title p { margin: 4px 0 0 0; font-size: 12px; }
                    .tab-title { color: #007bff; background: #f0f7ff; padding: 6px 10px; margin: 10px 0 10px 0; border-radius: 5px; font-size: 14px; }
                    .unit-section { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; page-break-inside: avoid; }
                    .unit-header { padding: 6px 10px; color: white; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
                    .equipo { background: #a3008d; }
                    .azul { background: #007bff; } .roja { background: #dc3545; } .verde { background: #28a745; }
                    .naranja { background: #fd7e14; } .amarilla { background: #ffc107; color: #333; }
                    table { width: 100%; border-collapse: collapse; }
                    th, td { border: 1px solid #eee; padding: 4px 6px; text-align: left; font-size: 10px; }
                    th { font-weight: 700; }
                    .btn-add, .btn-del { display: none !important; }
                </style>`;

            element.innerHTML = style + `
                <div class="pdf-title">
                    <h1>REPORTE DE UNIDADES 2026</h1>
                    <p>${weekStr} (${dateStr})</p>
                </div>
                <h2 class="tab-title">${tabLabel}</h2>
                <div class="content">${document.getElementById(tabId).innerHTML}</div>`;

            // Convertir inputs a texto para el PDF
            element.querySelectorAll('input').forEach(i => {
                const span = document.createElement('span');
                span.innerText = i.value || '-';
                i.parentNode.replaceChild(span, i);
            });

            return element;
        }

        // Generación en 2 páginas exactas: 1 Makers + 1 Takers
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

        async function addTabAsSinglePage(tabId, tabLabel, isFirstPage) {
            const pageEl = buildPdfPage(tabId, tabLabel);
            pageEl.style.position = 'fixed';
            pageEl.style.left = '-10000px';
            pageEl.style.top = '0';
            document.body.appendChild(pageEl);

            const canvas = await html2canvas(pageEl, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/jpeg', 0.98);

            const pageW = pdf.internal.pageSize.getWidth();
            const pageH = pdf.internal.pageSize.getHeight();

            // Ajuste para que SIEMPRE quepa en 1 página (si es muy alto, se reduce proporcionalmente)
            let imgW = pageW;
            let imgH = (canvas.height * imgW) / canvas.width;
            if (imgH > pageH) {
                imgH = pageH;
                imgW = (canvas.width * imgH) / canvas.height;
            }

            const x = (pageW - imgW) / 2;
            const y = 0;

            if (!isFirstPage) pdf.addPage();
            pdf.addImage(imgData, 'JPEG', x, y, imgW, imgH);

            document.body.removeChild(pageEl);
        }

        (async () => {
            try {
                await addTabAsSinglePage('Makers', 'MAKERS', true);
                await addTabAsSinglePage('Takers', 'TAKERS', false);
                pdf.save(`Reporte_Unidades_Semana_${weekVal}.pdf`);
            } catch (e) {
                console.error(e);
                alert('No se pudo generar el PDF.');
            }
        })();
    }

    function renderFromStorage(tabId, data) {
        const container = document.getElementById(tabId);
        container.innerHTML = '';
        data.forEach(u => container.appendChild(createUnitElement(tabId, u)));
    }
    // renderFromStorage already handles subgroups via createUnitElement

    function calcSummary(rows) {
        let asist = 0, monto = 0;
        rows.forEach(tr => {
            const aEl = tr.querySelector('.in-a');
            const mEl = tr.querySelector('.in-m');
            if (aEl) asist += parseFloat(aEl.value) || 0;
            if (mEl) monto += parseFloat(mEl.value) || 0;
        });
        return { asist, monto };
    }

    function fmtMonto(v) {
        return v % 1 === 0 ? v.toLocaleString('es-CR') : v.toLocaleString('es-CR', {minimumFractionDigits:0, maximumFractionDigits:3});
    }

    function summaryRowHtml(label, asist, monto, isTotal=false) {
        const cls = isTotal ? 'summary-row total-row' : 'summary-row';
        return `<tr class="${cls}">
            <td class="summary-label">${label}</td>
            <td>${asist}</td>
            <td>₡${fmtMonto(monto)}</td>
        </tr>`;
    }

    function rebuildSummaries() {
        document.querySelectorAll('.unit-section').forEach(sec => {
            // Remove old summaries
            sec.querySelectorAll('.summary-row').forEach(r => r.remove());

            const tbody = sec.querySelector('tbody');
            if (!tbody) return;

            const subHeaders = sec.querySelectorAll('.subgroup-header');
            const hasSubs = subHeaders.length > 0;

            if (hasSubs) {
                // TAKERS/RJ mode: collect rows per group
                let currentGroup = null;
                const groups = { TAKERS: [], RJ: [] };
                let rjHeaderRow = null;

                tbody.querySelectorAll('tr').forEach(tr => {
                    const sep = tr.querySelector('.subgroup-header');
                    if (sep) {
                        if (sep.innerText.includes('TAKERS')) {
                            currentGroup = 'TAKERS';
                        } else if (sep.innerText.includes('RJ')) {
                            currentGroup = 'RJ';
                            rjHeaderRow = tr;
                        }
                    } else if (currentGroup && tr.querySelector('.in-n')) {
                        groups[currentGroup].push(tr);
                    }
                });

                const t = calcSummary(groups.TAKERS);
                const r = calcSummary(groups.RJ);

                // Insertar subtotal TAKERS justo antes del encabezado RJ
                if (rjHeaderRow) {
                    rjHeaderRow.insertAdjacentHTML('beforebegin', summaryRowHtml('Total TAKERS', t.asist, t.monto));
                }
                // Insertar subtotal RJ y gran total al final
                tbody.insertAdjacentHTML('beforeend',
                    summaryRowHtml('Total RJ', r.asist, r.monto) +
                    summaryRowHtml('⬛ GRAN TOTAL', t.asist + r.asist, t.monto + r.monto, true)
                );
            } else {
                // Makers mode
                const rows = Array.from(tbody.querySelectorAll('tr')).filter(tr => tr.querySelector('.in-n'));
                const tot = calcSummary(rows);
                tbody.insertAdjacentHTML('beforeend',
                    summaryRowHtml('⬛ TOTAL', tot.asist, tot.monto, true)
                );
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
