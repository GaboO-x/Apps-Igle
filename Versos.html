<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versículos para Aprender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg:       #faf7f2;
            --bg2:      #ffffff;
            --bg3:      #f5f0e8;
            --gold:     #b8860b;
            --gold2:    #d4a017;
            --gold-lt:  #f0c842;
            --gold-bg:  #fdf3d0;
            --text:     #2a2218;
            --text2:    #5a4e3a;
            --text3:    #9a8e78;
            --border:   #e8dfc8;
            --border2:  #c9b882;
            --green:    #2d7a4f;
            --green-bg: #eaf5ee;
            --red:      #c0392b;
            --red-bg:   #fdecea;
            --shadow:   0 2px 16px rgba(90,70,20,0.08);
            --shadow2:  0 4px 32px rgba(90,70,20,0.13);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 80px;
        }

        /* ── Top nav ── */
        .topnav {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            height: 60px;
            box-shadow: 0 1px 8px rgba(90,70,20,0.06);
        }
        .nav-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15em;
            color: var(--gold);
            letter-spacing: 0.01em;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-brand span { color: var(--text2); font-size: 0.85em; font-family: 'DM Sans', sans-serif; font-weight: 300; }
        .nav-btn {
            padding: 7px 14px; background: transparent;
            border: 1px solid var(--border); border-radius: 20px;
            color: var(--text3); cursor: pointer; font-family: 'DM Sans', sans-serif;
            font-size: 0.82em; transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .nav-btn:hover { border-color: var(--gold2); color: var(--gold); }

        /* ── Tab bar ── */
        .tabbar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            max-width: 760px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .tab {
            padding: 14px 20px;
            font-size: 0.9em; font-weight: 500;
            color: var(--text3); cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s; display: flex; align-items: center; gap: 7px;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text2); }
        .tab.active { color: var(--gold); border-bottom-color: var(--gold2); }

        /* ── Page wrapper ── */
        .page { display: none; max-width: 760px; margin: 0 auto; padding: 24px 16px; }
        .page.active { display: block; }

        /* ── Section title ── */
        .section-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6em; color: var(--text);
            margin-bottom: 6px;
        }
        .section-sub { font-size: 0.88em; color: var(--text3); margin-bottom: 24px; }

        /* ── Month card ── */
        .month-container {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; margin-bottom: 12px;
            box-shadow: var(--shadow); overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .month-container:hover { box-shadow: var(--shadow2); border-color: var(--border2); }

        .month-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; cursor: pointer; user-select: none;
        }
        .month-header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
        .month-icon {
            width: 38px; height: 38px; flex-shrink: 0;
            background: var(--gold-bg); border: 1px solid #e8cc80;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-family: 'DM Serif Display', serif; font-size: 0.78em;
            color: var(--gold); font-weight: 400; letter-spacing: 0.03em;
        }
        .month-info { flex: 1; min-width: 0; }
        .month-name {
            font-weight: 600; font-size: 0.95em; color: var(--text);
            letter-spacing: 0.04em; transition: color 0.2s;
        }
        .month-header:hover .month-name { color: var(--gold); }
        .month-meta { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .month-progress-bar {
            height: 4px; background: var(--border); border-radius: 2px;
            overflow: hidden; flex: 1; max-width: 140px;
        }
        .month-progress-fill {
            height: 100%; border-radius: 2px;
            background: linear-gradient(90deg, var(--gold2), var(--gold-lt));
            transition: width 0.5s ease;
        }
        .month-counter-badge { font-size: 0.76em; color: var(--text3); white-space: nowrap; }

        .month-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .reset-btn {
            width: 30px; height: 30px; border-radius: 50%; background: transparent;
            border: 1px solid var(--border); color: var(--text3); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.72em;
            transition: all 0.25s;
        }
        .reset-btn:hover { border-color: var(--gold2); color: var(--gold); transform: rotate(180deg); }
        .chevron { color: var(--text3); font-size: 0.8em; transition: transform 0.3s; }
        .month-container.open .chevron { transform: rotate(180deg); }

        /* ── Panel ── */
        .content { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
        .content.visible { display: block; }

        .panel-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0 12px;
        }
        .verse-counter-label { font-size: 0.82em; color: var(--text3); }
        .diff-pips { display: flex; gap: 4px; }
        .diff-pip { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
        .diff-pip.active { background: var(--gold2); }

        /* ── Verse card ── */
        .verse-display-area { min-height: 160px; display: flex; flex-direction: column; justify-content: center; }

        .verse-card {
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 12px; padding: 22px 22px 18px;
            position: relative; overflow: hidden;
            animation: cardIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .verse-card::before {
            content: '\201C';
            position: absolute; top: 6px; right: 16px;
            font-family: 'DM Serif Display', serif; font-size: 5em;
            color: var(--gold2); opacity: 0.12; line-height: 1; pointer-events: none;
        }
        .verse-card.slide-out-left  { animation: slideOutLeft  0.28s ease forwards; }
        .verse-card.slide-out-right { animation: slideOutRight 0.28s ease forwards; }

        @keyframes cardIn       { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideOutLeft  { from{opacity:1;transform:translateX(0) scale(1)} to{opacity:0;transform:translateX(-40px) scale(0.97)} }
        @keyframes slideOutRight { from{opacity:1;transform:translateX(0) scale(1)} to{opacity:0;transform:translateX(40px)  scale(0.97)} }

        .verse-reference {
            font-size: 0.78em; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: block;
        }
        .verse-text-wrap {
            font-family: 'DM Serif Display', serif; font-style: italic;
            font-size: 1.13em; line-height: 1.85; color: var(--text2);
        }

        /* word visible */
        .w-vis { color: var(--text2); }

        /* blank word */
        .w-blank {
            display: inline-block;
            font-style: normal;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72em; font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--gold);
            background: var(--gold-bg);
            border-bottom: 2px solid var(--gold2);
            border-radius: 3px 3px 0 0;
            padding: 1px 3px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            position: relative; top: -1px;
        }
        .w-blank:hover { background: #fae8a0; }
        .w-blank.revealed {
            font-style: italic;
            font-family: 'DM Serif Display', serif;
            font-size: 1em; font-weight: 400;
            letter-spacing: normal;
            color: var(--gold);
            background: rgba(212,160,23,0.1);
            border-bottom-color: var(--gold2);
            cursor: default; top: 0; padding: 0 1px;
            animation: wordPop 0.22s ease;
        }
        @keyframes wordPop {
            0%  { transform: scale(0.8); opacity: 0.3; }
            65% { transform: scale(1.07); }
            100%{ transform: scale(1);   opacity: 1; }
        }

        /* hint row */
        .hint-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; gap: 8px; flex-wrap: wrap;
        }
        .reveal-hint { font-size: 0.78em; color: var(--text3); transition: opacity 0.3s; }
        .reveal-hint i { margin-right: 3px; }
        .btn-reveal-all {
            padding: 4px 12px; background: transparent;
            border: 1px solid var(--border2); border-radius: 14px;
            color: var(--gold); cursor: pointer;
            font-family: 'DM Sans', sans-serif; font-size: 0.8em; font-weight: 500;
            transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .btn-reveal-all:hover { background: var(--gold-bg); }
        .btn-reveal-all.done { opacity: 0; pointer-events: none; }

        /* ── Controls ── */
        .controls { display: flex; gap: 10px; margin-top: 14px; }
        .controls button {
            flex: 1; padding: 12px 16px; border: none; border-radius: 10px; cursor: pointer;
            font-family: 'DM Sans', sans-serif; font-size: 0.95em; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .controls button.dont-know {
            background: var(--red-bg); border: 1px solid rgba(192,57,43,0.2); color: var(--red);
        }
        .controls button.dont-know:hover { background: #fbd5d0; transform: translateY(-1px); }
        .controls button.know {
            background: var(--green-bg); border: 1px solid rgba(45,122,79,0.2); color: var(--green);
        }
        .controls button.know:hover { background: #d5eddf; transform: translateY(-1px); }
        .controls button:active  { transform: scale(0.98) !important; }
        .controls button:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

        /* ── Cycle complete ── */
        .cycle-complete {
            text-align: center; padding: 22px 16px; border-radius: 12px;
            background: var(--gold-bg); border: 1px solid #e8cc80;
            animation: cardIn 0.35s ease forwards;
        }
        .cycle-complete .cc-icon { font-size: 1.6em; color: var(--gold2); margin-bottom: 8px; }
        .cycle-complete .cc-title { font-family: 'DM Serif Display', serif; font-size: 1.2em; color: var(--text); margin-bottom: 4px; }
        .cycle-complete .cc-sub { font-size: 0.84em; color: var(--text3); margin-bottom: 14px; }
        .cc-stats { display: flex; justify-content: center; gap: 28px; margin-bottom: 16px; }
        .cc-stat .stat-num { font-family: 'DM Serif Display', serif; font-size: 1.7em; color: var(--text); }
        .cc-stat .stat-num.good { color: var(--green); }
        .cc-stat .stat-num.bad  { color: var(--red); }
        .cc-stat .stat-label { font-size: 0.78em; color: var(--text3); }
        .btn-continue {
            padding: 10px 26px; background: var(--gold2); color: #fff;
            border: none; border-radius: 22px; cursor: pointer;
            font-family: 'DM Sans', sans-serif; font-size: 0.9em; font-weight: 600;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-continue:hover { background: var(--gold); transform: translateY(-1px); }

        /* ── Final completion ── */
        .completion-message {
            text-align: center; padding: 28px 16px; border-radius: 12px;
            background: var(--green-bg); border: 1px solid rgba(45,122,79,0.2);
            animation: cardIn 0.35s ease forwards;
        }
        .completion-message .comp-icon { font-size: 2.2em; margin-bottom: 10px; }
        .completion-message .comp-title {
            font-family: 'DM Serif Display', serif; font-size: 1.4em;
            color: var(--green); margin-bottom: 6px;
        }
        .completion-message .comp-sub { font-size: 0.88em; color: var(--text3); margin-bottom: 18px; }
        .btn-repeat {
            padding: 9px 22px; background: transparent;
            border: 1px solid rgba(45,122,79,0.35); border-radius: 22px;
            color: var(--green); cursor: pointer;
            font-family: 'DM Sans', sans-serif; font-size: 0.88em; font-weight: 600;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-repeat:hover { background: #d0ead8; transform: translateY(-1px); }

        /* ═══════════════════════════════════════
           RANDOM SECTION
        ═══════════════════════════════════════ */
        .random-empty {
            text-align: center; padding: 50px 20px;
            color: var(--text3); font-size: 0.95em;
        }
        .random-empty i { font-size: 2.5em; color: var(--border2); margin-bottom: 14px; display: block; }
        .random-empty p { line-height: 1.6; }

        .random-card-wrap {
            animation: cardIn 0.35s ease forwards;
        }
        .random-verse-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; padding: 28px 28px 22px;
            box-shadow: var(--shadow2); position: relative; overflow: hidden;
            margin-bottom: 20px;
        }
        .random-verse-card::before {
            content: '\201C';
            position: absolute; top: 6px; right: 18px;
            font-family: 'DM Serif Display', serif; font-size: 6em;
            color: var(--gold2); opacity: 0.08; line-height: 1; pointer-events: none;
        }
        .random-month-chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--gold-bg); border: 1px solid #e8cc80;
            border-radius: 20px; padding: 3px 10px;
            font-size: 0.75em; font-weight: 600; color: var(--gold);
            letter-spacing: 0.04em; margin-bottom: 14px;
        }
        .random-reference {
            font-size: 0.82em; font-weight: 600; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--text3); margin-bottom: 12px; display: block;
        }
        .random-text {
            font-family: 'DM Serif Display', serif; font-style: italic;
            font-size: 1.18em; line-height: 1.85; color: var(--text2);
        }
        .random-text .w-blank {
            font-size: 0.7em; top: -2px;
        }
        .random-text .w-blank.revealed {
            font-size: 1em; top: 0;
        }

        .random-controls {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .random-controls button {
            flex: 1; min-width: 120px; padding: 12px 16px;
            border: none; border-radius: 10px; cursor: pointer;
            font-family: 'DM Sans', sans-serif; font-size: 0.93em; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .btn-next-random {
            background: var(--gold-bg); border: 1px solid #e8cc80 !important;
            color: var(--gold) !important;
        }
        .btn-next-random:hover { background: #fae8a0 !important; transform: translateY(-1px); }
        .random-controls button.dont-know {
            background: var(--red-bg); border: 1px solid rgba(192,57,43,0.2); color: var(--red);
        }
        .random-controls button.dont-know:hover { background: #fbd5d0; transform: translateY(-1px); }
        .random-controls button.know {
            background: var(--green-bg); border: 1px solid rgba(45,122,79,0.2); color: var(--green);
        }
        .random-controls button.know:hover { background: #d5eddf; transform: translateY(-1px); }
        .random-controls button:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

        .random-hint-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; gap: 8px; flex-wrap: wrap;
        }

        .random-stats {
            display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .rstat {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 100px;
            text-align: center; box-shadow: var(--shadow);
        }
        .rstat .rstat-num { font-family: 'DM Serif Display', serif; font-size: 1.6em; color: var(--text); }
        .rstat .rstat-label { font-size: 0.75em; color: var(--text3); margin-top: 2px; }

        /* ── Responsive ── */
        @media (max-width: 580px) {
            .tabbar { padding: 0 8px; }
            .tab { padding: 13px 12px; font-size: 0.83em; }
            .page { padding: 18px 12px; }
            .month-header { padding: 14px 14px; }
            .content { padding: 0 14px 16px; }
            .verse-text-wrap, .random-text { font-size: 1.05em; }
            .controls button, .random-controls button { padding: 11px 10px; font-size: 0.88em; }
        }
    </style>
</head>
<body>

<!-- Top nav -->
<div class="topnav">
    <div class="nav-brand">
        ✦ Versículos <span>para Aprender</span>
    </div>
    <button class="nav-btn" onclick="resetAllProgress()">
        <i class="fas fa-undo"></i> Reiniciar todo
    </button>
</div>

<!-- Tab bar -->
<div class="tabbar">
    <div class="tab active" id="tab-learn" onclick="showTab('learn')">
        <i class="fas fa-book-open"></i> Aprender
    </div>
    <div class="tab" id="tab-random" onclick="showTab('random')">
        <i class="fas fa-shuffle"></i> Aleatorio
    </div>
</div>

<!-- LEARN PAGE -->
<div class="page active" id="page-learn">
    <p class="section-title">Versículos por mes</p>
    <p class="section-sub">Toca un mes para comenzar a practicar.</p>
    <div id="months-wrapper"></div>
</div>

<!-- RANDOM PAGE -->
<div class="page" id="page-random">
    <p class="section-title">Práctica aleatoria</p>
    <p class="section-sub">Versículos que ya aprendiste, en orden aleatorio.</p>
    <div class="random-stats">
        <div class="rstat">
            <div class="rstat-num" id="rs-total">0</div>
            <div class="rstat-label">Disponibles</div>
        </div>
        <div class="rstat">
            <div class="rstat-num" id="rs-session-ok" style="color:var(--green)">0</div>
            <div class="rstat-label">Lo supe hoy</div>
        </div>
        <div class="rstat">
            <div class="rstat-num" id="rs-session-no" style="color:var(--red)">0</div>
            <div class="rstat-label">A repasar</div>
        </div>
    </div>
    <div id="random-area"></div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
// 3 levels: 100% | 50% hidden smart | first 2 words only
const LEVEL_MAX = 3;
const LEVEL_LAST_VISIBLE = 2;

// Skip these when choosing words to hide (connectors, monosyllables, prepositions)
const SKIP_WORDS = new Set([
    'de','del','la','las','el','los','le','les','lo',
    'un','una','unos','unas',
    'y','e','o','u','ni','que','si','ya',
    'a','al','en','con','sin','por','para','sobre','bajo','ante','tras',
    'como','más','mas','pero','sino','aunque','porque','pues',
    'me','te','se','tu','ti','su','sus',
    'yo','nos','vos','mi','mis',
    'no','muy','tan',
    'es','era','fue','son','ser',
    'ha','he','has','han','hay',
]);

const monthNames = {
    january:'Enero', february:'Febrero', march:'Marzo', april:'Abril',
    may:'Mayo', june:'Junio', july:'Julio', august:'Agosto',
    september:'Setiembre', october:'Octubre', november:'Noviembre', december:'Diciembre'
};
const monthAbbr = {
    january:'EN', february:'FE', march:'MA', april:'AB',
    may:'MY', june:'JN', july:'JL', august:'AG',
    september:'SE', october:'OC', november:'NO', december:'DI'
};

// ── DATA ──────────────────────────────────
const versesData = {
    january: [
        { text: "Además escoge tú de entre todo el pueblo varones de virtud, temerosos de Dios, varones de verdad, que aborrezcan la avaricia; y ponlos sobre el pueblo por jefes de millares, de centenas, de cincuenta y de diez.", reference: "Éx.18:21" },
        { text: "Jehová te bendiga, y te guarde; Jehová haga resplandecer su rostro sobre ti, y tenga de ti misericordia; Jehová alce sobre ti su rostro, y ponga en ti paz.", reference: "Num.6:24-26" },
        { text: "Ahora, pues, Israel, ¿qué pide Jehová tu Dios de ti, sino que temas a Jehová tu Dios, que andes en todos sus caminos, y que lo ames, y sirvas a Jehová tu Dios con todo tu corazón y con toda tu alma; que guardes los mandamientos de Jehová y sus estatutos, que yo te prescribo hoy, para que tengas prosperidad?... Él es el objeto de tu alabanza, y él es tu Dios, que ha hecho contigo estas cosas grandes y terribles que tus ojos han visto.", reference: "Dt.10:12-13, 21" },
        { text: "Nunca se apartará de tu boca este libro de la ley, sino que de día y de noche meditarás en él, para que guardes y hagas conforme a todo lo que en él está escrito; porque entonces harás prosperar tu camino, y todo te saldrá bien. Mira que te mando que te esfuerces y seas valiente; no temas ni desmayes, porque Jehová tu Dios estará contigo en dondequiera que vayas.", reference: "Jos.1:8-9" }
    ],

// ═══════════════════════════════════════════
// TEXT HELPERS
// ═══════════════════════════════════════════
function wordLetterCount(w) { return w.replace(/[^a-zA-ZáéíóúüñÁÉÍÓÚÜÑ]/g,'').length || w.length; }
function makeBlank(w) { return '_'.repeat(Math.max(wordLetterCount(w),1)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cleanWord(w) { return w.replace(/[^a-zA-Z\u00C0-\u024F]/g,'').toLowerCase(); }
function isSkippable(w) { return SKIP_WORDS.has(cleanWord(w)) || cleanWord(w).length <= 2; }

function chooseHiddenIndices(words, level) {
    const n = words.length;
    if (level === 1) return new Set();
    if (level === 3) {
        // Hide everything after first LEVEL_LAST_VISIBLE words
        const s = new Set();
        for (let i = LEVEL_LAST_VISIBLE; i < n; i++) s.add(i);
        return s;
    }
    // Level 2: hide ~50% but only meaningful words (not connectors/monosyllables)
    // Build pool of "hideable" indices (skip word 0 and skip-list words)
    const pool = [];
    for (let i = 1; i < n; i++) {
        if (!isSkippable(words[i])) pool.push(i);
    }
    // If not enough meaningful words, fall back to all non-skip words
    shuffleArr(pool);
    const target = Math.max(1, Math.round(n * 0.50));
    // Take up to target from pool; if pool too small, pad with any remaining words
    const chosen = new Set(pool.slice(0, target));
    return chosen;
}

function buildVerseHTML(text, level) {
    const words = text.split(' ');
    const hidden = chooseHiddenIndices(words, level);
    return words.map((w,i) => hidden.has(i)
        ? `<span class="w-blank" data-word="${esc(w)}" onclick="revealWord(this)">${makeBlank(w)}</span>`
        : `<span class="w-vis">${esc(w)}</span>`
    ).join(' ');
}

function revealWord(el) {
    if (el.classList.contains('revealed')) return;
    el.classList.add('revealed');
    el.textContent = el.dataset.word;
    el.onclick = null;
    checkAllRevealed(el.closest('[data-card]') || el.closest('.verse-card') || el.closest('.random-verse-card'));
}

function revealAll(btn) {
    const card = btn.closest('[data-card]') || btn.closest('.verse-card') || btn.closest('.random-verse-card');
    if (!card) return;
    card.querySelectorAll('.w-blank:not(.revealed)').forEach(el => {
        el.classList.add('revealed'); el.textContent = el.dataset.word; el.onclick = null;
    });
    checkAllRevealed(card);
}

function checkAllRevealed(card) {
    if (!card) return;
    if (card.querySelectorAll('.w-blank:not(.revealed)').length === 0) {
        const hint = card.querySelector('.reveal-hint');
        const btn  = card.querySelector('.btn-reveal-all');
        if (hint) hint.style.opacity = '0';
        if (btn)  btn.classList.add('done');
    }
}

function shuffleArr(a) {
    for (let i=a.length-1;i>0;i--) {
        const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
    }
}

// STATE
// ═══════════════════════════════════════════
let monthState = {};

function makeState(id) {
    const n = versesData[id].length;
    const curLevel={}, nextLevel={};
    for (let i=0;i<n;i++) curLevel[i]=nextLevel[i]=1;
    return { queue:[...Array(n).keys()], curLevel, nextLevel, cycleKnown:0, completed:false };
}

// ── Which verses count as "learned"?
// A verse is learned when its nextLevel has reached 4 (passed level 4 successfully)
// OR if the month is completed. More precisely: nextLevel[i] >= 4 means they passed level 3.
// We'll consider a verse "learned" when nextLevel[i] >= 4.
function getLearnedVerses() {
    const result = []; // { monthId, verseIdx, text, reference, monthName }
    for (const id in versesData) {
        const st = monthState[id];
        if (!st) continue;
        versesData[id].forEach((v, i) => {
            if (st.nextLevel[i] >= LEVEL_MAX || st.completed) {
                result.push({ monthId: id, verseIdx: i, text: v.text, reference: v.reference, monthName: monthNames[id] });
            }
        });
    }
    return result;
}

// ── Random session state ──────────────────
let randomQueue   = [];   // shuffled learned verses
let randomPointer = 0;
let randomSessionOk = 0;
let randomSessionNo = 0;

function buildRandomQueue() {
    const learned = getLearnedVerses();
    randomQueue = [...learned];
    shuffleArr(randomQueue);
    randomPointer = 0;
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`page-${tab}`).classList.add('active');
    if (tab === 'random') initRandomPage();
}

function buildUI() {
    const wrap = document.getElementById('months-wrapper');
    wrap.innerHTML = '';
    for (const id in versesData) {
        const el = document.createElement('div');
        el.className = 'month-container';
        el.id = `mc-${id}`;
        el.innerHTML = `
          <div class="month-header" onclick="toggleMonth('${id}')">
            <div class="month-header-left">
              <div class="month-icon">${monthAbbr[id]}</div>
              <div class="month-info">
                <div class="month-name">${monthNames[id].toUpperCase()}</div>
                <div class="month-meta">
                  <div class="month-progress-bar">
                    <div class="month-progress-fill" id="pf-${id}" style="width:0%"></div>
                  </div>
                  <div class="month-counter-badge" id="ct-${id}">0 / ${versesData[id].length} dominados</div>
                </div>
              </div>
            </div>
            <div class="month-header-right">
              <button class="reset-btn" onclick="event.stopPropagation();resetMonth('${id}')">
                <i class="fas fa-redo"></i>
              </button>
              <i class="fas fa-chevron-down chevron"></i>
            </div>
          </div>
          <div id="panel-${id}" class="content">
            <div class="panel-topbar">
              <span class="verse-counter-label" id="vc-${id}"></span>
              <div class="diff-pips" id="dp-${id}">
                <div class="diff-pip"></div><div class="diff-pip"></div>
                <div class="diff-pip"></div>
              </div>
            </div>
            <div class="verse-display-area" id="da-${id}"></div>
            <div class="controls">
              <button class="dont-know" id="no-${id}" onclick="mark('${id}',false)">
                <i class="fas fa-times"></i> No lo sé
              </button>
              <button class="know" id="yes-${id}" onclick="mark('${id}',true)">
                <i class="fas fa-check"></i> Lo sé
              </button>
            </div>
          </div>`;
        wrap.appendChild(el);
    }
}

function toggleMonth(id) {
    const mc=document.getElementById(`mc-${id}`);
    const panel=document.getElementById(`panel-${id}`);
    if (mc.classList.contains('open')) {
        mc.classList.remove('open'); panel.classList.remove('visible');
        document.getElementById(`da-${id}`).innerHTML='';
    } else {
        mc.classList.add('open'); panel.classList.add('visible');
        renderCurrent(id);
    }
}

function renderCurrent(id) {
    const st=monthState[id], da=document.getElementById(`da-${id}`);
    da.innerHTML='';
    if (st.completed) { showFinal(id); return; }
    if (st.queue.length===0) { showCycleEnd(id); return; }

    const vi=st.queue[0], v=versesData[id][vi], level=st.curLevel[vi];
    const n=versesData[id].length, done=n-st.queue.length;
    const hasHidden=level>1;

    document.getElementById(`vc-${id}`).textContent=`Versículo ${done+1} de ${n}`;
    document.getElementById(`dp-${id}`).querySelectorAll('.diff-pip')
        .forEach((p,i)=>p.classList.toggle('active',i<level));

    const card=document.createElement('div');
    card.className='verse-card'; card.setAttribute('data-card','1');
    card.innerHTML=`
      <span class="verse-reference">${v.reference}</span>
      <div class="verse-text-wrap">${buildVerseHTML(v.text, level)}</div>
      ${hasHidden?`<div class="hint-row">
        <span class="reveal-hint"><i class="fas fa-hand-pointer"></i> Toca cada espacio para revelar</span>
        <button class="btn-reveal-all" onclick="revealAll(this)"><i class="fas fa-eye"></i> Revelar todo</button>
      </div>`:''}`;
    da.appendChild(card);
    ctrlDisabled(id,false);
}

function mark(id, knew) {
    const st=monthState[id];
    if (!st||st.queue.length===0) return;
    const vi=st.queue[0];
    if (knew) { st.nextLevel[vi]=Math.min(st.curLevel[vi]+1,LEVEL_MAX); st.cycleKnown++; }
    else { st.nextLevel[vi]=1; }
    ctrlDisabled(id,true);
    const card=document.getElementById(`da-${id}`)?.querySelector('.verse-card');
    const advance=()=>{ st.queue.shift(); renderCurrent(id); updateBadge(id); saveState(); };
    if (card) { card.classList.add(knew?'slide-out-right':'slide-out-left'); card.addEventListener('animationend',advance,{once:true}); }
    else advance();
}

function showCycleEnd(id) {
    const st=monthState[id], n=versesData[id].length;
    const da=document.getElementById(`da-${id}`);
    da.innerHTML=''; ctrlDisabled(id,true);
    if (Object.values(st.curLevel).every(l=>l===LEVEL_MAX) && st.cycleKnown===n) {
        st.completed=true; updateBadge(id); saveState(); showFinal(id); return;
    }
    const notKnown=n-st.cycleKnown;
    const div=document.createElement('div'); div.className='cycle-complete';
    div.innerHTML=`
      <div class="cc-icon"><i class="fas fa-flag-checkered"></i></div>
      <div class="cc-title">¡Ciclo completado!</div>
      <div class="cc-sub">Continúa para seguir avanzando.</div>
      <div class="cc-stats">
        <div class="cc-stat"><div class="stat-num good">${st.cycleKnown}</div><div class="stat-label">Lo supe</div></div>
        <div class="cc-stat"><div class="stat-num bad">${notKnown}</div><div class="stat-label">A repasar</div></div>
      </div>
      <button class="btn-continue" onclick="startNextCycle('${id}')">Continuar <i class="fas fa-arrow-right"></i></button>`;
    da.appendChild(div);
}

function startNextCycle(id) {
    const st=monthState[id], n=versesData[id].length;
    for (let i=0;i<n;i++) st.curLevel[i]=st.nextLevel[i];
    st.cycleKnown=0; st.queue=[...Array(n).keys()];
    renderCurrent(id); updateBadge(id); saveState();
}

function showFinal(id) {
    const da=document.getElementById(`da-${id}`);
    da.innerHTML=''; ctrlDisabled(id,true);
    const div=document.createElement('div'); div.className='completion-message';
    div.innerHTML=`
      <div class="comp-icon">✦</div>
      <div class="comp-title">¡Mes dominado!</div>
      <div class="comp-sub">Completaste los 4 niveles de memorización.<br>¡La Palabra vive en ti!</div>
      <button class="btn-repeat" onclick="repeatMonth('${id}')"><i class="fas fa-redo"></i> Volver a practicar</button>`;
    da.appendChild(div);
}

function repeatMonth(id) {
    const n=versesData[id].length, curLevel={}, nextLevel={};
    for (let i=0;i<n;i++) curLevel[i]=nextLevel[i]=LEVEL_MAX;
    monthState[id]={queue:[...Array(n).keys()],curLevel,nextLevel,cycleKnown:0,completed:false};
    updateBadge(id); renderCurrent(id); saveState();
}

function updateBadge(id) {
    const st=monthState[id], n=versesData[id].length;
    const mastered=Object.values(st.nextLevel).filter(l=>l>=LEVEL_MAX).length;
    const pf=document.getElementById(`pf-${id}`), ct=document.getElementById(`ct-${id}`);
    if (pf) pf.style.width=st.completed?'100%':`${(mastered/n)*100}%`;
    if (ct) ct.textContent=st.completed?'✦ ¡Mes completado!':`${mastered} / ${n} dominados`;
}

function ctrlDisabled(id,dis) {
    const y=document.getElementById(`yes-${id}`), n=document.getElementById(`no-${id}`);
    if(y)y.disabled=dis; if(n)n.disabled=dis;
}

// ═══════════════════════════════════════════
// RANDOM PAGE
// ═══════════════════════════════════════════
function initRandomPage() {
    buildRandomQueue();
    randomSessionOk = 0;
    randomSessionNo = 0;
    renderRandomStats();
    renderRandomVerse();
}

function renderRandomStats() {
    const learned = getLearnedVerses();
    document.getElementById('rs-total').textContent    = learned.length;
    document.getElementById('rs-session-ok').textContent = randomSessionOk;
    document.getElementById('rs-session-no').textContent = randomSessionNo;
}

function renderRandomVerse() {
    const area = document.getElementById('random-area');
    const learned = getLearnedVerses();

    if (learned.length === 0) {
        area.innerHTML = `
          <div class="random-empty">
            <i class="fas fa-book"></i>
            <p>Aún no tienes versículos aprendidos.<br>¡Completa algunos meses primero!</p>
          </div>`;
        return;
    }

    if (randomPointer >= randomQueue.length) {
        // Reshuffled another round
        buildRandomQueue();
    }

    const item = randomQueue[randomPointer];
    const level = 4; // always hardest in random mode
    const hasHidden = true;

    const wrap = document.createElement('div');
    wrap.className = 'random-card-wrap';
    wrap.innerHTML = `
      <div class="random-verse-card" data-card="1">
        <div class="random-month-chip"><i class="fas fa-calendar-alt"></i> ${item.monthName}</div>
        <span class="random-reference">${item.reference}</span>
        <div class="random-text">${buildVerseHTML(item.text, level)}</div>
        <div class="random-hint-row">
          <span class="reveal-hint"><i class="fas fa-hand-pointer"></i> Toca cada espacio para revelar</span>
          <button class="btn-reveal-all" onclick="revealAll(this)"><i class="fas fa-eye"></i> Revelar todo</button>
        </div>
      </div>
      <div class="random-controls">
        <button class="dont-know" onclick="markRandom(false)"><i class="fas fa-times"></i> No lo sé</button>
        <button class="btn-next-random" onclick="markRandom(null)"><i class="fas fa-forward"></i> Saltar</button>
        <button class="know" onclick="markRandom(true)"><i class="fas fa-check"></i> Lo sé</button>
      </div>`;

    area.innerHTML = '';
    area.appendChild(wrap);
}

function markRandom(knew) {
    if (knew === true)  randomSessionOk++;
    if (knew === false) randomSessionNo++;
    randomPointer++;
    renderRandomStats();

    const area  = document.getElementById('random-area');
    const card  = area.querySelector('.random-verse-card');
    const btns  = area.querySelectorAll('.random-controls button');
    btns.forEach(b => b.disabled = true);

    if (card && knew !== null) {
        card.style.transition = 'opacity 0.25s, transform 0.25s';
        card.style.opacity    = '0';
        card.style.transform  = knew ? 'translateX(40px) scale(0.97)' : 'translateX(-40px) scale(0.97)';
        setTimeout(renderRandomVerse, 280);
    } else {
        renderRandomVerse();
    }
}

// ═══════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════
function resetMonth(id) {
    monthState[id]=makeState(id); updateBadge(id);
    if (document.getElementById(`mc-${id}`)?.classList.contains('open')) renderCurrent(id);
    saveState();
}
function resetAllProgress() {
    for (const id in versesData) monthState[id]=makeState(id);
    saveState(); location.reload();
}

// ═══════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════
function saveState() {
    try { localStorage.setItem('verso_v7', JSON.stringify(monthState)); } catch(e) {}
}
function loadState() {
    try {
        const raw=localStorage.getItem('verso_v7');
        if (!raw) return;
        const saved=JSON.parse(raw);
        for (const id in versesData) { if (saved[id]) monthState[id]=saved[id]; }
    } catch(e) {}
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
for (const id in versesData) monthState[id]=makeState(id);
buildUI();
loadState();
for (const id in versesData) updateBadge(id);
</script>
